<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>&#24656;&#40857;&#21658;&#21658;&#23707;</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app" class="shell">
      <section class="play" aria-live="polite">
        <div id="sceneLayer" class="scene-layer" aria-hidden="true"></div>

        <div id="homeScreen" class="screen active">
          <div class="component-scene home-scene">
            <h1 class="visually-hidden">&#24656;&#40857;&#21658;&#21658;&#23707;</h1>
            <p class="visually-hidden">&#36873;&#25321;&#19968;&#21482;&#24656;&#40857;&#65292;&#24320;&#22987;&#25925;&#20107;&#21543;&#65281;</p>
            <button id="musicButton" class="image-button music-hotspot" type="button" aria-label="&#38899;&#20048;"></button>
            <button class="image-button dino-choice dino-choice-main" type="button" data-dino="xiaobao" aria-label="&#36873;&#25321;&#23567;&#26292;"></button>
            <button class="image-button dino-choice dino-choice-left" type="button" data-dino="adai" aria-label="&#36873;&#25321;&#38463;&#21574;"></button>
            <button class="image-button dino-choice dino-choice-right" type="button" data-dino="gulu" aria-label="&#36873;&#25321;&#21653;&#22108;"></button>
          </div>
        </div>

        <div id="playScreen" class="screen component-page story-page">
          <button id="homeButton" class="image-button story-title-art" type="button" aria-label="&#22238;&#21040;&#39318;&#39029;"></button>
          <div class="story-hotspots">
            <span id="themePill" class="visually-hidden">&#24425;&#34425;&#26862;&#26519;</span>
            <div id="dinoAvatar" class="visually-hidden"><img id="dinoImage" src="/assets/xiaobao.png" alt="&#23567;&#26292;" /></div>
            <span id="speakerName" class="visually-hidden">&#23567;&#26292;</span>
            <p id="dinoLine" class="visually-hidden">&#36873;&#19968;&#21482;&#24656;&#40857;&#65292;&#25925;&#20107;&#23601;&#24320;&#22987;&#21862;&#12290;</p>
            <button id="choiceA" class="image-button story-choice-a" type="button" aria-label="&#36873;&#25321;&#31532;&#19968;&#20010;&#25925;&#20107;&#26041;&#21521;"></button>
            <button id="choiceB" class="image-button story-choice-b" type="button" aria-label="&#36873;&#25321;&#31532;&#20108;&#20010;&#25925;&#20107;&#26041;&#21521;"></button>
            <button id="micButton" class="hotspot story-mic" type="button">&#35828;&#35805;</button>
            <button id="speakButton" class="hotspot story-replay" type="button">&#37325;&#21548;</button>
            <button id="finishButton" class="hotspot story-finish" type="button">&#23436;&#25104;</button>
            <form id="textForm" class="hidden-form">
              <input id="textInput" type="text" maxlength="32" placeholder="&#20063;&#21487;&#20197;&#25171;&#23383;&#32473;&#24656;&#40857;" />
              <button type="submit">&#21457;&#36865;</button>
            </form>
          </div>
        </div>

        <div id="hatchScreen" class="screen component-page hatch-page">
          <form id="hatchForm" class="hatch-hotspots">
            <button id="hatchMicButton" class="hotspot hatch-mic" type="button">&#35828;</button>
            <button id="hatchImageButton" class="hotspot hatch-image" type="button">&#22270;</button>
            <input id="hatchPrompt" class="hatch-prompt-input" type="text" maxlength="42" placeholder="&#35828;&#35828;&#20320;&#24819;&#35201;&#30340;&#23567;&#24656;&#40857;..." aria-label="&#35828;&#35828;&#20320;&#24819;&#35201;&#30340;&#23567;&#24656;&#40857;" />
            <button class="hotspot hatch-chip chip-blue" type="button" data-hatch-chip="&#34013;&#33394;">&#34013;&#33394;</button>
            <button class="hotspot hatch-chip chip-sing" type="button" data-hatch-chip="&#20250;&#21809;&#27468;">&#20250;&#21809;&#27468;</button>
            <button class="hotspot hatch-chip chip-horn" type="button" data-hatch-chip="&#38271;&#35282;">&#38271;&#35282;</button>
            <button class="hotspot hatch-chip chip-berry" type="button" data-hatch-chip="&#29233;&#33609;&#33683;">&#29233;&#33609;&#33683;</button>
            <button id="hatchButton" class="hotspot hatch-submit" type="submit">&#24320;&#22987;&#x5B75;&#x5316;</button>
            <p id="hatchStatus" class="hatch-status" aria-live="polite"></p>
          </form>
        </div>

        <div id="galleryScreen" class="screen component-page gallery-page">
          <div class="gallery-hotspots">
            <button id="refreshArtifacts" class="image-button works-refresh" type="button" aria-label="&#21047;&#26032;&#20316;&#21697;"></button>
            <div id="artifactList" class="works-live-list" aria-live="polite"></div>
          </div>
        </div>

        <div id="parentScreen" class="screen component-page parent-page">
          <div class="parent-hotspots">
            <label class="visually-hidden" for="themeSelect">&#20027;&#39064;</label>
            <select id="themeSelect" class="parent-theme"></select>
            <label class="visually-hidden" for="dailyLimit">&#27599;&#26085;&#20998;&#38047;</label>
            <input id="dailyLimit" class="parent-limit" type="number" min="1" max="60" />
            <label class="parent-toggle parent-safety"><input id="safetyToggle" type="checkbox" checked /><span>&#22768;&#38899;</span></label>
            <label class="parent-toggle parent-image"><input id="imageToggle" type="checkbox" /><span>&#22270;&#29255;</span></label>
            <label class="parent-toggle parent-music"><input id="voiceToggle" type="checkbox" /><span>&#32972;&#26223;&#38899;&#20048;</span></label>
            <button id="saveSettings" class="image-button parent-save" type="button" aria-label="&#20445;&#23384;&#35774;&#32622;"></button>
            <p id="settingsStatus" class="visually-hidden"></p>
          </div>
        </div>

        <nav class="bottom-nav" aria-label="&#20027;&#35201;&#21151;&#33021;">
          <div id="navLayer" class="nav-art" aria-hidden="true"></div>
          <button id="galleryTab" class="nav-button" type="button"><span class="nav-label">&#20316;&#21697;</span></button>
          <button id="hatchTab" class="nav-button active" type="button"><span class="nav-label">&#x5B75;&#x5316;</span></button>
          <button id="parentTab" class="nav-button" type="button"><span class="nav-label">&#23478;&#38271;</span></button>
        </nav>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
